name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run pytest
        run: pytest --tb=short -v
